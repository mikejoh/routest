global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity=critical
      receiver: pagerduty-critical
      continue: false

    - matchers:
        - severity=warning
        - team=platform
      receiver: slack-platform
      continue: false

    - matchers:
        - severity=warning
      receiver: slack-general
      continue: false

    - matchers:
        - team=security
      receiver: security-team
      continue: true

    - matchers:
        - env=prod
        - severity=critical
      receiver: oncall-prod
      continue: false

receivers:
  - name: default-receiver
    slack_configs:
      - api_url: https://hooks.slack.com/services/EXAMPLE
        channel: '#alerts'

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: example-key

  - name: slack-platform
    slack_configs:
      - api_url: https://hooks.slack.com/services/EXAMPLE
        channel: '#platform-alerts'

  - name: slack-general
    slack_configs:
      - api_url: https://hooks.slack.com/services/EXAMPLE
        channel: '#general-alerts'

  - name: security-team
    slack_configs:
      - api_url: https://hooks.slack.com/services/EXAMPLE
        channel: '#security-alerts'
    webhook_configs:
      - url: https://example.com/security-webhook

  - name: oncall-prod
    pagerduty_configs:
      - service_key: prod-oncall-key
    slack_configs:
      - api_url: https://hooks.slack.com/services/EXAMPLE
        channel: '#prod-incidents'
